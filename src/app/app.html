<!-- transaction.component.html -->
<div class="p-6 space-y-6">
  <h2 class="text-xl font-bold">NMI Transaction POC</h2>

  <!-- Input + Button -->
  <div class="flex space-x-4 items-center">
    <input type="number" placeholder="Enter amount" [(ngModel)]="amount"
      class="p-inputtext w-40 border rounded-lg p-2" />
    <button pButton type="button" label="Start Transaction" class="p-button-success"></button>
  </div>

  <!-- Raw JSON Response -->
  <div *ngIf="responseJson" class="p-4 bg-gray-100 rounded-lg shadow">
    <h3 class="font-semibold mb-2">Raw JSON Response (Mock):</h3>
    <pre class="text-sm">{{ responseJson | json }}</pre>
  </div>

  <!-- Transaction Table -->
  <p-table *ngIf="tableData.length > 0" [value]="tableData" class="shadow-lg rounded-lg">
    <ng-template pTemplate="header">
      <tr>
        <th>Transaction ID</th>
        <th>Status</th>
        <th>Response</th>
        <th>Auth Code</th>
        <th>Amount</th>
        <th>Method</th>
        <th>Date</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.transactionid }}</td>
        <td>{{ row.responsetext }}</td>
        <td>{{ row.response }}</td>
        <td>{{ row.authcode }}</td>
        <td>${{ row.amount }}</td>
        <td>{{ row.method }}</td>
        <td>{{ row.date }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
